# Ray Megatron GKD — colocate mode (train + rollout share GPUs), colocated teacher.
rlhf_type: gkd

model: Qwen/Qwen3.5-2B
teacher_model: Qwen/Qwen3.5-4B
gkd_logits_topk: 64

dataset:
  - 'AI-ModelScope/alpaca-gpt4-data-zh#200'
dataset_num_proc: 2
split_dataset_ratio: 0

micro_batch_size: 1
global_batch_size: 8
logging_steps: 1
seed: 42
max_length: 4096
max_completion_length: 4096
padding_free: true
attention_backend: flash

lr: 1e-6
min_lr: 1e-6
lr_warmup_fraction: 0.0

temperature: 1.0
lmbda: 1
beta: 0.5
sft_alpha: 0.0

finetune: true
no_save_optim: true
no_save_rng: true
recompute_granularity: selective
train_iters: 5

use_vllm: true

colocate_groups: [[train, rollout]]
offload_model: true
offload_optimizer: true
offload_teacher_model: true
sleep_level: 1

train:
  gpus: 2
  tuner_type: lora
  lora_rank: 8
  lora_alpha: 32
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  expert_model_parallel_size: 1
  context_parallel_size: 1
  output_dir: megatron_output/t6_ray_gkd

rollout:
  gpus: 2
  vllm_tensor_parallel_size: 1
  vllm_gpu_memory_utilization: 0.4
  vllm_max_model_len: 8192
