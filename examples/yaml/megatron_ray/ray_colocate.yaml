# Ray DPO training — colocated (train + ref on same GPUs)
#
# Usage:
#   python -m swift.ray.megatron.pipeline --config examples/megatron/rlhf/dpo/ray_colocate.yaml

rlhf_type: dpo

# --- Shared config ---
model: Qwen/Qwen2.5-0.5B
dataset: hjh0119/shareAI-Llama3-DPO-zh-en-emoji
micro_batch_size: 2
global_batch_size: 4
num_train_epochs: 1
logging_steps: 1
beta: 0.1
seed: 42
max_length: 512
padding_free: false
finetune: true
cross_entropy_loss_fusion: true
lr: 1e-5
lr_warmup_fraction: 0.05
min_lr: 1e-6
attention_backend: flash

# --- Colocate: train + ref share GPUs ---
colocate_groups: [[train, ref]]

# --- Group configs ---
train:
  gpus: 4
  tuner_type: full
  tensor_model_parallel_size: 2
  sequence_parallel: true
  output_dir: megatron_output/ray_dpo_colocate_test

ref:
  gpus: 4
  tensor_model_parallel_size: 2
