# Ray GRPO training — co-located mode (train + vLLM rollout on same GPUs)
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 python -m swift.ray.megatron.pipeline \
#       --config examples/yaml/megatron_ray/ray_grpo_colocate.yaml

rlhf_type: grpo

# --- Shared config ---
model: Qwen/Qwen2.5-0.5B
dataset: AI-ModelScope/alpaca-gpt4-data-en#200
micro_batch_size: 2
global_batch_size: 4
num_train_epochs: 1
logging_steps: 1
seed: 42
max_length: 512
max_completion_length: 128
padding_free: false
finetune: true
cross_entropy_loss_fusion: true
lr: 1e-5
lr_warmup_fraction: 0.05
min_lr: 1e-6
attention_backend: flash
temperature: 0.7
use_vllm: true

# --- Co-located ---
colocate_groups: [[train, rollout]]

# --- Group configs ---
train:
  gpus: 4
  tuner_type: full
  tensor_model_parallel_size: 2
  sequence_parallel: true
  output_dir: megatron_output/ray_grpo_colocate_test

rollout:
  gpus: 4
  vllm_tensor_parallel_size: 2
