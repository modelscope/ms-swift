# Ray DPO test — 2 GPU separated
rlhf_type: dpo

model: Qwen/Qwen2.5-0.5B
dataset: hjh0119/shareAI-Llama3-DPO-zh-en-emoji
micro_batch_size: 2
global_batch_size: 4
num_train_epochs: 1
logging_steps: 1
beta: 0.1
seed: 42
max_length: 512
padding_free: false
finetune: true
cross_entropy_loss_fusion: true
lr: 1e-5
lr_warmup_fraction: 0.05
min_lr: 1e-6
attention_backend: flash

train:
  gpus: 1
  tuner_type: full
  output_dir: megatron_output/ray_dpo_2gpu_test

ref:
  gpus: 1
