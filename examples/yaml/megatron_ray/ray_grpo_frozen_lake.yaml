# Ray + Megatron GRPO on FrozenLake (multi-turn, colocate mode).
#
# Reuses the dataset and plugin shipped with the plain-Megatron example:
#   - examples/megatron/grpo/multi_turn/frozen_lake.jsonl         (128 rows, one seed per row)
#   - examples/megatron/grpo/multi_turn/frozen_lake_plugin.py     (env)
rlhf_type: grpo

model: Qwen/Qwen3.5-2B
dataset: 'examples/megatron/grpo/multi_turn/frozen_lake.jsonl#1024'
external_plugins: examples/megatron/grpo/multi_turn/frozen_lake_plugin.py
load_from_cache_file: false
split_dataset_ratio: 0
dataset_num_proc: 4
dataloader_num_workers: 4

multi_turn_scheduler: gym_scheduler
gym_env: frozen_lake
use_gym_env: true
max_turns: 10

micro_batch_size: 2
global_batch_size: 32
num_generations: 8
steps_per_generation: 4
num_train_epochs: 3
train_iters: 300
logging_steps: 1
seed: 42
max_length: 4096
max_completion_length: 1024
padding_free: true
cross_entropy_loss_fusion: true
gradient_accumulation_fusion: false
attention_backend: flash
recompute_granularity: selective

lr: 1e-6
lr_warmup_fraction: 0.0
min_lr: 1e-6
bf16: true
temperature: 1.0
top_p: 1.0
top_k: 80
beta: 0.001
epsilon: 0.2
epsilon_high: 0.2
loss_type: grpo
advantage_estimator: grpo
importance_sampling_level: token
dynamic_sample: false
overlong_filter: true
log_completions: true

use_vllm: true
colocate_groups: [[train, rollout]]
offload_model: true
offload_optimizer: true
sleep_level: 2

eval_steps: 1000
save_steps: 1000
no_save_optim: true
no_save_rng: true

train:
  gpus: 4
  tuner_type: full
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  output_dir: megatron_output/ray_grpo_frozen_lake

rollout:
  gpus: 4
  vllm_tensor_parallel_size: 1
  vllm_gpu_memory_utilization: 0.5
  vllm_max_model_len: 4096
