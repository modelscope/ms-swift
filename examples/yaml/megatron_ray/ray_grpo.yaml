# Ray GRPO training — separated mode (train + vLLM rollout on different GPUs)
#
# Train and rollout each have dedicated GPUs. This avoids offload overhead
# but requires more total GPUs.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 megatron rlhf --use_ray \
#       --config examples/yaml/megatron_ray/ray_grpo.yaml

rlhf_type: grpo

model: Qwen/Qwen2.5-0.5B
dataset: AI-ModelScope/alpaca-gpt4-data-en#200
micro_batch_size: 2
global_batch_size: 8
num_generations: 4
steps_per_generation: 2
num_train_epochs: 1
logging_steps: 1
seed: 42
max_length: 512
max_completion_length: 128
padding_free: false
finetune: true
cross_entropy_loss_fusion: true
lr: 1e-5
lr_warmup_fraction: 0.05
min_lr: 1e-6
attention_backend: unfused
temperature: 0.7
use_vllm: true
reward_funcs: [format]

train:
  gpus: 2
  tuner_type: full
  tensor_model_parallel_size: 2
  sequence_parallel: true
  output_dir: megatron_output/ray_grpo_separate

rollout:
  gpus: 2
  vllm_tensor_parallel_size: 2
  vllm_gpu_memory_utilization: 0.4
  vllm_enforce_eager: false
